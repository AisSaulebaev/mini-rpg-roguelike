<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Оборона базы</title>
  <link rel="stylesheet" href="style.css?v=20260428c">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">

    <!-- ================== ГЛАВНОЕ МЕНЮ ================== -->
    <div id="bd-menu">
      <div class="bd-menu-bg" id="bd-menu-bg-a"></div>
      <div class="bd-menu-bg" id="bd-menu-bg-b"></div>
      <div class="bd-menu-overlay"></div>
      <header class="bd-menu-head">
        <button class="bd-back" id="bd-menu-back" type="button">← Лончер</button>
        <div class="bd-menu-title">Оборона базы</div>
        <div class="bd-menu-meta">
          <div class="bd-meta-gold">💰<b id="bd-menu-gold">0</b></div>
          <div class="bd-meta-gem">💎<b id="bd-menu-gems">0</b></div>
        </div>
      </header>
      <div class="bd-menu-body" id="bd-menu-body"></div>
      <nav class="bd-tabs">
        <button class="bd-tab" data-tab="upgrade" type="button">⚡<span>Прокачка</span></button>
        <button class="bd-tab bd-tab-main active" data-tab="map" type="button">⚔️<span>Играть</span></button>
        <button class="bd-tab" data-tab="chests" type="button">🎁<span>Сундуки</span></button>
      </nav>
    </div>

    <!-- ================== БОЙ ================== -->
    <div id="bd-play" hidden>
      <header class="bd-head">
        <button class="bd-back" id="bd-back" type="button">← Меню</button>
        <div class="bd-title" id="bd-title">Оборона базы</div>
        <div class="bd-army" id="bd-army" hidden><span>👥</span><b id="bd-army-count">0</b>/<span id="bd-army-max">15</span></div>
        <div class="bd-coins"><span>🪙</span><b id="bd-coins">0</b></div>
      </header>
      <div class="bd-hint" id="bd-hint">Купи здание из магазина → перетяни на базу</div>
      <div id="bd-canvas-wrap">
        <canvas id="bd-canvas"></canvas>
        <div class="bd-overlay-top" id="bd-overlay-top">
          <button class="bd-cta bd-cta-secondary" id="bd-reset" type="button">↺ Сброс</button>
          <button class="bd-cta" id="bd-start" type="button">⚔️ Начать бой</button>
          <button class="bd-cta bd-cta-secondary" id="bd-surrender" type="button" hidden>🏳️ Сдаться</button>
        </div>
        <button class="bd-hero-summon" id="bd-hero-summon" type="button" hidden>
          <div class="bd-hero-portrait">🦸</div>
          <div class="bd-hero-status" id="bd-hero-status"></div>
        </button>
        <div class="bd-bottom-overlay">
          <div class="bd-stash" id="bd-stash" hidden>
            <div class="bd-stash-label">📦 Склад</div>
            <div class="bd-stash-row" id="bd-stash-row"></div>
          </div>
          <div class="bd-shop" id="bd-shop">
            <div class="bd-shop-row" id="bd-shop-row"></div>
            <button class="bd-reroll" id="bd-reroll" type="button">↻<br><b id="bd-reroll-cost">3</b>🪙</button>
          </div>
        </div>
      </div>
    </div>

  </div>
  <script src="game.js?v=2026042805"></script>
</body>
</html>
