<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Оборона базы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260429c">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <audio id="bd-bgm" loop preload="auto"></audio>
  <div id="app">

    <!-- ================== ГЛАВНОЕ МЕНЮ ================== -->
    <div id="bd-menu">
      <div class="bd-menu-bg" id="bd-menu-bg-a"></div>
      <div class="bd-menu-bg" id="bd-menu-bg-b"></div>
      <div class="bd-menu-overlay"></div>
      <header class="bd-menu-head">
        <button class="bd-back" id="bd-menu-back" type="button">← Лончер</button>
        <div class="bd-menu-title">Оборона базы</div>
        <div class="bd-menu-meta">
          <div class="bd-meta-gold"><img src="img/icon_gold.png?v=1" alt="💰" class="bd-coin-img" draggable="false"><b id="bd-menu-gold">0</b></div>
          <div class="bd-meta-gem"><img src="img/icon_gem.png?v=1" alt="💎" class="bd-coin-img" draggable="false"><b id="bd-menu-gems">0</b></div>
          <button class="bd-settings-btn" id="bd-settings-btn" type="button" title="Настройки"><img src="img/icon_settings.png?v=1" alt="⚙️" draggable="false"></button>
        </div>
      </header>
      <div class="bd-menu-body" id="bd-menu-body"></div>
      <nav class="bd-tabs">
        <button class="bd-tab" data-tab="upgrade" type="button" aria-label="Прокачка"><img src="img/tab_upgrade.png?v=1" alt="Прокачка" draggable="false"></button>
        <button class="bd-tab bd-tab-main active" data-tab="map" type="button" aria-label="Играть"><img src="img/tab_play.png?v=1" alt="Играть" draggable="false"></button>
        <button class="bd-tab" data-tab="chests" type="button" aria-label="Сундуки"><img src="img/tab_chests.png?v=1" alt="Сундуки" draggable="false"></button>
      </nav>
    </div>

    <!-- ================== БОЙ ================== -->
    <div id="bd-play" hidden>
      <div id="bd-canvas-wrap">
        <canvas id="bd-canvas"></canvas>
        <header class="bd-head">
          <button class="bd-back" id="bd-back" type="button">← Меню</button>
          <div class="bd-wave-pill">
            <div class="bd-wave-pill-loc" id="bd-title">Оборона базы</div>
            <div class="bd-wave-pill-wave"><span class="bd-wave-pill-label">Волна</span><b id="bd-wave-num">1</b><span class="bd-wave-pill-sep">/</span><span id="bd-wave-total">10</span></div>
          </div>
          <div class="bd-army" id="bd-army" hidden><span>👥</span><b id="bd-army-count">0</b>/<span id="bd-army-max">15</span></div>
          <div class="bd-coins"><img src="img/icon_gold.png?v=1" alt="🪙" class="bd-coin-img" draggable="false"><b id="bd-coins">0</b></div>
          <button class="bd-settings-btn bd-settings-btn-play" id="bd-settings-btn-play" type="button" title="Настройки"><img src="img/icon_settings.png?v=1" alt="⚙️" draggable="false"></button>
        </header>
        <div class="bd-hint" id="bd-hint" hidden></div>
        <div class="bd-overlay-top" id="bd-overlay-top">
          <button class="bd-cta bd-cta-secondary" id="bd-reset" type="button">↺ Сброс</button>
          <button class="bd-cta" id="bd-start" type="button">⚔️ Начать бой</button>
          <button class="bd-cta bd-cta-secondary" id="bd-surrender" type="button" hidden>🏳️ Сдаться</button>
        </div>
        <button class="bd-speed" id="bd-speed" type="button" hidden>⏩ 1×</button>
        <button class="bd-hero-summon" id="bd-hero-summon" type="button" hidden>
          <div class="bd-hero-portrait"><img src="img/icon_hero.png?v=1" alt="Герой" draggable="false"></div>
          <div class="bd-hero-status" id="bd-hero-status"></div>
        </button>
        <div class="bd-bottom-overlay">
          <div class="bd-stash" id="bd-stash" hidden>
            <div class="bd-stash-label">📦 Склад</div>
            <div class="bd-stash-row" id="bd-stash-row"></div>
          </div>
          <div class="bd-shop" id="bd-shop">
            <div class="bd-shop-row" id="bd-shop-row"></div>
            <button class="bd-reroll" id="bd-reroll" type="button">↻<br><b id="bd-reroll-cost">3</b><img src="img/icon_gold.png?v=1" alt="🪙" class="bd-coin-img-sm" draggable="false"></button>
          </div>
        </div>
      </div>
    </div>

    <!-- ================== НАСТРОЙКИ ================== -->
    <div class="bd-modal-overlay hidden" id="bd-settings-modal">
      <div class="bd-settings-panel">
        <div class="bd-modal-title">⚙️ Настройки</div>
        <div class="bd-settings-row">
          <div class="bd-settings-label">
            <span id="bd-settings-vol-icon">🔊</span>
            <span>Громкость музыки</span>
            <span class="bd-settings-vol-value" id="bd-settings-vol-value">70%</span>
          </div>
          <input type="range" id="bd-settings-volume" class="bd-settings-slider" min="0" max="100" step="1" value="70">
        </div>
        <div class="bd-settings-row">
          <label class="bd-settings-mute">
            <input type="checkbox" id="bd-settings-mute">
            <span>Выключить музыку</span>
          </label>
        </div>
        <div class="bd-modal-actions">
          <button class="bd-cta" id="bd-settings-close" type="button">Готово</button>
        </div>
      </div>
    </div>

  </div>
  <script src="game.js?v=2026042906"></script>
</body>
</html>
