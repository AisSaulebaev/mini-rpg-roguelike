<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Аркада Аиса</title>
  <link rel="stylesheet" href="launcher.css?v=20260422c">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="launcher">
    <header class="launcher-head">
      <h1 class="launcher-title">Аркада Аиса</h1>
      <div class="launcher-souls"><span class="souls-icon">💀</span> <b id="launcher-souls">0</b></div>
    </header>

    <div class="launcher-hello" id="launcher-hello"></div>

    <div class="game-list">
      <button class="game-card game-rpg" data-href="games/rpg/">
        <div class="game-card-art">
          <img src="games/rpg/img/characters/player.png" alt="" class="game-card-sprite">
        </div>
        <div class="game-card-body">
          <div class="game-card-title">Подземелье</div>
          <div class="game-card-desc">Пошаговый рогалик. Спускайся глубже, собирай сеты, побеждай боссов.</div>
          <div class="game-card-tags">
            <span class="tag tag-live">Доступна</span>
            <span class="tag">Рогалик</span>
            <span class="tag">Пошаговая</span>
          </div>
        </div>
        <div class="game-card-arrow">▶</div>
      </button>

      <button class="game-card game-bd" data-href="games/bd/" type="button">
        <div class="game-card-art">
          <div class="td-placeholder">🏰</div>
        </div>
        <div class="game-card-body">
          <div class="game-card-title">Оборона базы</div>
          <div class="game-card-desc">Строй здания, спавни воинов, отбивайся от волн в лесу гоблинов.</div>
          <div class="game-card-tags">
            <span class="tag tag-soon">В разработке</span>
            <span class="tag">Auto-battler</span>
          </div>
        </div>
        <div class="game-card-arrow">▶</div>
      </button>
    </div>

    <footer class="launcher-foot">
      Души 💀 общие между играми.
    </footer>
  </main>

  <script src="launcher.js?v=20260422c"></script>
</body>
</html>
